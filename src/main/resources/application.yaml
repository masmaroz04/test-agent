spring:
  application:
    name: test_agent
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-s4q7d35k5uyh6r3n.eu.auth0.com/
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:usersdb}
    username: ${DB_USER:usersapp}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always

auth0:
  audience: https://users-api
  allowed-emails:
    - patiparn.kij@gmail.com

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
