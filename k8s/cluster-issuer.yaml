apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: __CLUSTER_ISSUER_NAME__
spec:
  acme:
    server: __ACME_SERVER__
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: __CLUSTER_ISSUER_NAME__-account-key
    solvers:
    - http01:
        ingress:
          ingressClassName: __INGRESS_CLASS__
